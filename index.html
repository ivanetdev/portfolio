<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works 2026 Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Works 2026 Portfolio</h1>
        <form id="postForm">
            <input type="text" id="title" placeholder="Título del trabajo" required>
            <textarea id="description" placeholder="Descripción" required></textarea>
            <input type="file" id="image" accept="image/*" required>
            <button type="submit">Subir trabajo</button>
        </form>
        <div id="posts"></div>
    </div>
</body>

</html>
